<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>web</title>
  <link rel="manifest" href="manifest.json">

  <!-- Cropper.js for image_cropper -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script>
    (function() {
      // These values can be replaced during build or set via environment variables
      window.SUPABASE_URL = window.SUPABASE_URL || "YOUR_SUPABASE_URL_HERE";
      window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY_HERE";
      window.GOOGLE_MAPS_API_KEY = window.GOOGLE_MAPS_API_KEY || "YOUR_GOOGLE_MAPS_API_KEY_HERE";

      var mapsKey = window.GOOGLE_MAPS_API_KEY;
      if (mapsKey === "YOUR_GOOGLE_MAPS_API_KEY_HERE" || !mapsKey) {
        console.warn("Google Maps API key not found. Please set GOOGLE_MAPS_API_KEY.");
      }
      
      var script = document.createElement('script');
      script.src = "https://maps.googleapis.com/maps/api/js?key=" + mapsKey + "&libraries=places&loading=async";
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();
  </script>
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
